<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New to MEGA? Get Started with Our $40 Intro Pack | Raleigh & Cary</title>
  <meta name="description" content="Try the Triangle's only Lagree, Tramp, and Mat studio for just $40 for 3 classes. Perfect for first-timers. No commitment. Free grippy socks included.">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root { --pink: #E91E8C; --pink-light: #FFF0F5; --pink-dark: #C4167A; --teal: #2ECDA7; --teal-light: #E6FBF5; --black: #1A1A1A; --white: #FFFFFF; --gray-50: #FAFAFA; --gray-100: #F5F5F5; --gray-200: #E5E5E5; --gray-400: #A3A3A3; --gray-600: #525252; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; color: var(--black); background: var(--white); -webkit-font-smoothing: antialiased; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.06); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-icon { width: 44px; height: 44px; background: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .nav-logo-icon span { color: var(--black); font-weight: 900; font-size: 18px; letter-spacing: -1px; }
    .nav-logo-text { font-weight: 900; font-size: 22px; letter-spacing: 3px; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--gray-600); transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--pink); }
    .nav-cta { background: var(--pink); color: white !important; padding: 10px 24px; border-radius: 100px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; }
    .nav-cta:hover { background: var(--pink-dark); }
    .btn-primary { background: var(--pink); color: white; padding: 16px 36px; border-radius: 100px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.25s; display: inline-block; border: none; cursor: pointer; }
    .btn-primary:hover { background: var(--pink-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,30,140,0.4); }
    .btn-white { background: white; color: var(--pink); padding: 16px 40px; border-radius: 100px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: inline-block; transition: all 0.25s; }
    .btn-white:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

    /* PAGE HERO */
    .page-hero { padding: 140px 0 80px; background: var(--black); color: white; position: relative; overflow: hidden; }
    .page-hero-pattern { position: absolute; inset: 0; opacity: 0.05; background: repeating-linear-gradient(45deg, transparent, transparent 20px, var(--pink) 20px, var(--pink) 22px); }
    .page-hero-content { position: relative; z-index: 2; }
    .page-hero .badge { display: inline-block; background: rgba(233,30,140,0.15); color: var(--pink); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 6px 16px; border-radius: 100px; margin-bottom: 20px; border: 1px solid rgba(233,30,140,0.3); }
    .page-hero h1 { font-family: 'Playfair Display', serif; font-size: 60px; font-weight: 700; line-height: 1.1; max-width: 650px; margin-bottom: 20px; }
    .page-hero .subtitle { font-size: 18px; color: rgba(255,255,255,0.65); max-width: 550px; line-height: 1.7; margin-bottom: 40px; }
    .hero-offer { background: rgba(46,205,167,0.15); border: 2px solid var(--teal); border-radius: 16px; padding: 32px; max-width: 500px; margin-bottom: 40px; }
    .hero-offer-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
    .hero-offer-price { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; color: white; margin-bottom: 8px; }
    .hero-offer-detail { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 4px; }

    /* SECTION STYLES */
    .section-label { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--pink); margin-bottom: 12px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; margin-bottom: 16px; line-height: 1.15; }
    .body-text { font-size: 16px; color: var(--gray-600); line-height: 1.8; margin-bottom: 20px; }

    /* OFFER DETAILS */
    .offer-details { padding: 80px 0; background: var(--gray-50); }
    .offer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 48px; }
    .offer-item { text-align: center; }
    .offer-icon { width: 64px; height: 64px; background: var(--pink-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 32px; }
    .offer-item h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .offer-item p { font-size: 15px; color: var(--gray-600); line-height: 1.6; }

    /* FORMAT CARDS */
    .formats { padding: 80px 0; }
    .formats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 48px; }
    .format-card { border: 2px solid var(--gray-200); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
    .format-card::before { content: ''; position: absolute; inset: 0; background: var(--pink-light); opacity: 0; transition: opacity 0.3s; z-index: -1; }
    .format-card.active { border-color: var(--pink); }
    .format-card.active::before { opacity: 1; }
    .format-icon { width: 56px; height: 56px; background: var(--teal-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; }
    .format-card.active .format-icon { background: var(--pink-light); }
    .format-card h3 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    .format-card .format-desc { font-size: 14px; color: var(--gray-600); line-height: 1.6; margin-bottom: 20px; }
    .format-details { font-size: 13px; color: var(--gray-600); padding: 16px; background: var(--gray-50); border-radius: 12px; margin-bottom: 20px; line-height: 1.6; display: none; }
    .format-card.active .format-details { display: block; }
    .format-link { color: var(--pink); font-weight: 700; font-size: 14px; transition: color 0.2s; }
    .format-link:hover { color: var(--pink-dark); }

    /* WHAT TO EXPECT TIMELINE */
    .expect { padding: 80px 0; background: var(--gray-50); }
    .timeline-container { max-width: 800px; margin: 48px auto 0; }
    .timeline-item { display: grid; grid-template-columns: 200px 1fr; gap: 40px; margin-bottom: 48px; align-items: start; }
    .timeline-phase { background: white; border-radius: 12px; padding: 24px; border-left: 4px solid var(--pink); }
    .timeline-phase-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
    .timeline-phase-list { list-style: none; }
    .timeline-phase-item { font-size: 14px; color: var(--gray-600); line-height: 1.7; margin-bottom: 12px; padding-left: 20px; position: relative; }
    .timeline-phase-item::before { content: '•'; position: absolute; left: 0; color: var(--teal); font-weight: 700; }

    /* WHAT TO WEAR */
    .wear-section { padding: 80px 0; }
    .wear-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 48px; }
    .wear-card { background: var(--gray-50); border-radius: 16px; padding: 40px; }
    .wear-card h3 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .wear-list { list-style: none; }
    .wear-item { font-size: 15px; color: var(--gray-600); line-height: 1.8; margin-bottom: 16px; padding-left: 24px; position: relative; }
    .wear-item::before { content: '✓'; position: absolute; left: 0; color: var(--teal); font-weight: 700; }

    /* FAQ */
    .faq { padding: 80px 0; background: var(--gray-50); }
    .faq-list { max-width: 700px; margin: 48px auto 0; }
    .faq-item { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .faq-q { padding: 20px 24px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
    .faq-q:hover { background: var(--gray-50); }
    .faq-a { padding: 0 24px 20px; font-size: 15px; color: var(--gray-600); line-height: 1.7; }
    .faq-toggle { font-size: 20px; color: var(--pink); font-weight: 300; transition: transform 0.3s; }

    /* CTA BAND */
    .cta-band { padding: 80px 0; background: var(--pink); text-align: center; color: white; }
    .cta-band h2 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 24px; }

    /* FOOTER */
    .footer { background: var(--black); color: white; padding: 48px 0 24px; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-size: 13px; color: rgba(255,255,255,0.4); }
    .footer-links-row { display: flex; gap: 24px; }
    .footer-links-row a { font-size: 13px; color: rgba(255,255,255,0.5); transition: color 0.2s; }
    .footer-links-row a:hover { color: var(--pink); }

    @media (max-width: 768px) {
      .page-hero h1 { font-size: 36px; }
      .page-hero .subtitle { font-size: 16px; }
      .hero-offer-price { font-size: 36px; }
      .offer-grid { grid-template-columns: 1fr; }
      .formats-grid { grid-template-columns: 1fr; }
      .wear-grid { grid-template-columns: 1fr; }
      .timeline-item { grid-template-columns: 1fr; gap: 20px; }
      .nav-links { display: none; }
      .cta-band h2 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const Nav = () => (
      <nav className="nav">
        <div className="nav-inner">
          <a href="homepage_FINAL.html" className="nav-logo">
            <div className="nav-logo-icon"><span>M</span></div>
            <span className="nav-logo-text">Mega</span>
          </a>
          <div className="nav-links">
            <a href="lagree_FINAL.html">Lagree</a>
            <a href="tramp_FINAL.html">Tramp</a>
            <a href="mat_FINAL.html">Mat</a>
            <a href="raleigh_FINAL.html">Raleigh</a>
            <a href="cary_FINAL.html">Cary</a>
            <a href="first_timer_FINAL.html" className="active">New Here?</a>
            <a href="pricing_FINAL.html">Pricing</a>
            <a href="#" className="nav-cta">Book a Class</a>
          </div>
        </div>
      </nav>
    );

    const Hero = () => (
      <section className="page-hero">
        <div className="page-hero-pattern"></div>
        <div className="container page-hero-content">
          <div className="badge">Welcome to MEGA</div>
          <h1>New to MEGA?</h1>
          <p className="subtitle">Ready to try the Triangle's only Lagree, Tramp, and Mat studio? Start your fitness journey with 3 classes for just $40.</p>
          <div className="hero-offer">
            <div className="hero-offer-label">Your Intro Pack</div>
            <div className="hero-offer-price">$40</div>
            <div className="hero-offer-detail">3 Classes • Any Format • Any Location</div>
            <div className="hero-offer-detail">Free Grippy Socks Included</div>
          </div>
          <a href="#book" className="btn-primary">Book Your Intro Pack</a>
        </div>
      </section>
    );

    const OfferDetails = () => {
      const items = [
        { icon: '🎓', title: '3 Classes', desc: 'Try any combination of Lagree, Tramp, or Mat.' },
        { icon: '📍', title: 'Both Locations', desc: 'Use your classes at our Raleigh or Cary studios.' },
        { icon: '⏱️', title: '30-Day Window', desc: 'Complete your 3 classes within 30 days of purchase.' },
        { icon: '🧦', title: 'Free Grippy Socks', desc: 'Included with your intro pack — yours to keep.' },
        { icon: '✓', title: 'No Commitment', desc: 'Zero auto-renewal. No hidden fees.' },
        { icon: '💪', title: 'All Levels', desc: 'Perfect for beginners. Modifications available in every class.' },
      ];
      return (
        <section className="offer-details">
          <div className="container">
            <div style={{ textAlign: 'center' }}>
              <div className="section-label">The Intro Pack</div>
              <div className="section-title">Everything You Get</div>
            </div>
            <div className="offer-grid">
              {items.map((item, i) => (
                <div key={i} className="offer-item">
                  <div className="offer-icon">{item.icon}</div>
                  <h3>{item.title}</h3>
                  <p>{item.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const Formats = () => {
      const [activeFormat, setActiveFormat] = useState(0);
      const formats = [
        {
          name: 'Lagree',
          icon: '⚙️',
          desc: 'High-intensity, low-impact.',
          details: 'Slow, controlled movements on the Megaformer. Every muscle is engaged for 50 full minutes.',
          link: 'lagree_FINAL.html',
        },
        {
          name: 'Tramp',
          icon: '🦘',
          desc: 'Cardio-powered, bounce-based.',
          details: 'Dynamic jumping and rebounding on the Springboard. Burns serious calories while being low-impact.',
          link: 'tramp_FINAL.html',
        },
        {
          name: 'Mat',
          icon: '🧘',
          desc: 'Functional, bodyweight-based.',
          details: 'Core-focused, minimal equipment. Perfect for building stability and functional strength.',
          link: 'mat_FINAL.html',
        },
      ];
      return (
        <section className="formats">
          <div className="container">
            <div style={{ textAlign: 'center' }}>
              <div className="section-label">Mix & Match</div>
              <div className="section-title">Choose Your Format</div>
              <p className="body-text">Not sure which format is for you? Try them all! Your intro pack lets you explore all three.</p>
            </div>
            <div className="formats-grid">
              {formats.map((fmt, i) => (
                <div
                  key={i}
                  className={`format-card ${activeFormat === i ? 'active' : ''}`}
                  onClick={() => setActiveFormat(i)}
                >
                  <div className="format-icon">{fmt.icon}</div>
                  <h3>{fmt.name}</h3>
                  <p className="format-desc">{fmt.desc}</p>
                  <div className="format-details">{fmt.details}</div>
                  <a href={fmt.link} className="format-link">Learn More →</a>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const Expect = () => {
      const phases = [
        {
          phase: 'Before Class',
          items: [
            'Book online or via the MEGA app',
            'Wear fitted, moisture-wicking clothes',
            'Arrive 10 minutes early for check-in',
            'Get your machine setup explained',
          ],
        },
        {
          phase: 'During Class',
          items: [
            'Instructor guides you through every move',
            'Modifications available at all times',
            'Go at your own pace and intensity',
            '50 minutes of full-body focus',
          ],
        },
        {
          phase: 'After Class',
          items: [
            'Expect muscle soreness for 1–2 days (the good kind!)',
            'Hydrate and refuel within 30 minutes',
            'Book your next class while the stoke is high',
          ],
        },
      ];
      return (
        <section className="expect">
          <div className="container">
            <div style={{ textAlign: 'center' }}>
              <div className="section-label">Your First Experience</div>
              <div className="section-title">What to Expect</div>
            </div>
            <div className="timeline-container">
              {phases.map((p, i) => (
                <div key={i} className="timeline-item">
                  <div style={{ fontSize: '16px', fontWeight: 800, color: 'var(--pink)' }}>{p.phase}</div>
                  <div className="timeline-phase">
                    <ul className="timeline-phase-list">
                      {p.items.map((item, j) => (
                        <li key={j} className="timeline-phase-item">{item}</li>
                      ))}
                    </ul>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const Wear = () => {
      const wear = [
        {
          title: 'What to Wear',
          items: [
            'Fitted or moisture-wicking clothes',
            'No baggy or loose fabrics (carriage moves)',
            'Sports bra or supportive top recommended',
            'Leggings, shorts, or fitted pants',
            'Layer-friendly for temperature changes',
          ],
        },
        {
          title: 'What to Bring',
          items: [
            'Grippy socks (included with intro or buy at studio)',
            'Water bottle (stay hydrated!)',
            'Towel (optional but recommended)',
            'No shoes needed — barefoot or socks only',
            'Hair tie if you have longer hair',
          ],
        },
      ];
      return (
        <section className="wear-section">
          <div className="container">
            <div style={{ textAlign: 'center', marginBottom: 48 }}>
              <div className="section-label">Preparation</div>
              <div className="section-title">What to Wear & Bring</div>
            </div>
            <div className="wear-grid">
              {wear.map((w, i) => (
                <div key={i} className="wear-card">
                  <h3>{w.title}</h3>
                  <ul className="wear-list">
                    {w.items.map((item, j) => (
                      <li key={j} className="wear-item">{item}</li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const FAQ = () => {
      const [openIdx, setOpenIdx] = useState(null);
      const faqs = [
        {
          q: 'What if I\'ve never worked out before?',
          a: 'You\'re in the right place! MEGA is for all fitness levels. Our instructors are trained to offer modifications for every exercise, and you control your own intensity. Many of our best members started as complete beginners.',
        },
        {
          q: 'Can I try all 3 formats with my intro pack?',
          a: 'Absolutely! Your 3 classes can be any mix of Lagree, Tramp, or Mat. We recommend trying at least one class of each to see which (or which combo) resonates with you.',
        },
        {
          q: 'What\'s the cancellation policy?',
          a: 'You can cancel or reschedule classes up to 12 hours before the scheduled start time. No cancellation fees. If you need to cancel within 12 hours, you\'ll lose the class credit, but it\'s no big deal—we all have emergencies.',
        },
        {
          q: 'Do I need to bring anything besides myself?',
          a: 'Nope! We provide grippy socks with your intro pack. Bring water and a towel if you like, but they\'re optional. We have water available at the studios.',
        },
        {
          q: 'Is there parking at both locations?',
          a: 'Yes! Both our Raleigh and Cary studios have ample free parking. No hassle.',
        },
        {
          q: 'What happens after my intro pack expires?',
          a: 'After 30 days, your intro classes expire. But if you fall in love with MEGA (we think you will!), we\'ll help you choose a membership that fits your goals and budget.',
        },
      ];
      return (
        <section className="faq">
          <div className="container">
            <div style={{ textAlign: 'center' }}>
              <div className="section-label">Got Questions?</div>
              <div className="section-title">New Member FAQ</div>
            </div>
            <div className="faq-list">
              {faqs.map((f, i) => (
                <div key={i} className="faq-item">
                  <div className="faq-q" onClick={() => setOpenIdx(openIdx === i ? null : i)}>
                    {f.q}
                    <span className="faq-toggle" style={{ transform: openIdx === i ? 'rotate(45deg)' : 'none' }}>+</span>
                  </div>
                  {openIdx === i && <div className="faq-a">{f.a}</div>}
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    const CTA = () => (
      <section className="cta-band">
        <div className="container">
          <h2>Your Strongest Self Starts Here</h2>
          <a href="#book" className="btn-white">Book Now</a>
        </div>
      </section>
    );

    const Footer = () => (
      <footer className="footer">
        <div className="container">
          <div className="footer-inner">
            <span className="footer-copy">© 2026 The MEGA Workout</span>
            <div className="footer-links-row">
              <a href="homepage_FINAL.html">Home</a>
              <a href="lagree_FINAL.html">Lagree</a>
              <a href="tramp_FINAL.html">Tramp</a>
              <a href="mat_FINAL.html">Mat</a>
              <a href="pricing_FINAL.html">Pricing</a>
            </div>
          </div>
        </div>
      </footer>
    );

    const App = () => (
      <div>
        <Nav />
        <Hero />
        <OfferDetails />
        <Formats />
        <Expect />
        <Wear />
        <FAQ />
        <CTA />
        <Footer />
      </div>
    );
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
