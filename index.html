    :root {

      --pink-light: #E6F9F2;
      --pink-dark: #009B6A;
      --teal: #58F095;     /* Lime — secondary accent */

      --gray-100: #F5F5F5;

    .nav-links a:hover { color: var(--pink); }
    .nav-cta { background: var(--pink); color: white; padding: 10px 24px; border-radius: 100px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; border: none; cursor: pointer; }

    .hero { position: relative; height: 85vh; min-height: 600px; background: var(--black); overflow: hidden; display: flex; align-items: center; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #222223 0%, #2d1a2d 50%, #1a1a2d 100%); }

    .location-cta { background: var(--teal); color: var(--black); padding: 12px 28px; border-radius: 100px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: inline-block; transition: all 0.2s; }
    .location-cta:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(88,240,149,0.3); }

    .first-timer { padding: 100px 0; background: linear-gradient(135deg, var(--pink-light) 0%, #FFF 50%, var(--teal-light) 100%); }
    .ft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }

    .review-source { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

    /* CTA */
    .cta-section { padding: 100px 0; background: var(--pink); text-align: center; color: white; position: relative; overflow: hidden; }
    .cta-pattern { position: absolute; inset: 0; opacity: 0.1; background: repeating-linear-gradient(-45deg, transparent, transparent 20px, white 20px, white 22px); }

    .cta-section p { font-size: 18px; opacity: 0.9; margin-bottom: 36px; }
    .btn-white { background: white; color: var(--pink); padding: 16px 40px; border-radius: 100px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: inline-block; transition: all 0.25s; }
    .btn-white:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

    .footer { background: var(--black); color: white; padding: 60px 0 32px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
    .footer-brand-text { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.7; margin-top: 16px; max-width: 280px; }

    .footer-links { list-style: none; }

    .footer-copy { font-size: 13px; color: rgba(255,255,255,0.4); }
    .footer-social { display: flex; gap: 16px; }
    .footer-social a { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); font-size: 14px; transition: all 0.2s; }

    /* MOBILE NAV */
    .mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; }

      .location-grid { grid-template-columns: 1fr; }
      .ft-grid { grid-template-columns: 1fr; }
      .reviews-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }

    }
  </style>
</head>
