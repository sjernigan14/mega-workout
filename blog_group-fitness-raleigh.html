            <div className="pull-quote">MEGA is the Triangle's only studio dedicated exclusively to Lagree Fitness on the Megaformer machine.</div>

            <p>Traditional Pilates studios focus on controlled, low-impact strengthening. The difference with <a href="lagree_FINAL.html">Lagree</a> is intensity and the machine. While traditional Pilates is wonderful for flexibility and core strength, Lagree delivers a full-body, high-intensity, muscle-building challenge in 50 minutes.</p>

            <p>While Raleigh has great fitness options across many disciplines, here's why MEGA is unique:</p>
