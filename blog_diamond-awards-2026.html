            <p>We have some big news. MEGA Raleigh just won <strong>Gold for Best Yoga or Pilates Studio</strong> in the 2026 Midtown Diamond Awards. And our very own Alicia Belle took home <strong>Bronze for Best Wellness Coach or Personal Trainer</strong>.</p>

            <p>This is voted on by the community. Real people who show up, sweat, shake, and keep coming back. That means more to us than any trophy ever could.</p>

            <h2>What Are the Midtown Diamond Awards?</h2>
            <p>Every year, Midtown Magazine runs its Diamond Awards to recognize the best businesses across Raleigh in categories ranging from dining to fitness to wellness. Winners are selected by reader votes, making it a true reflection of what the community loves.</p>

            <p>In the Sports + Fitness category for 2026, MEGA Raleigh stood out among some seriously strong competition in the Triangle fitness scene.</p>

            <h2>The Results</h2>

            <h3>Best Yoga or Pilates Studio</h3>
            <p><strong>Gold: MEGA Raleigh</strong></p>
            <p>This one hit different. We opened our doors with one mission: give people a workout they actually look forward to. Lagree Megaformer, Tramp Cardio, and Mat Pilates under one roof. No pretension. Just results. And the Triangle voted us number one.</p>

            <h3>Best Wellness Coach or Personal Trainer</h3>
            <p><strong>Bronze: Alicia Belle, MEGA Raleigh</strong></p>
            <p>If you have ever taken one of Alicia's classes, this makes total sense. She brings energy, expertise, and that rare ability to push you past what you thought you could do while making you laugh the whole time. Alicia represents everything MEGA is about.</p>

            <div className="pull-quote">Voted by the community. That means more to us than any trophy ever could.</div>

            <h2>What This Means for MEGA</h2>
            <p>Winning Gold is validation that our approach works. We built MEGA around three ideas: world-class instructors, a format menu that keeps things fresh, and a community that actually shows up for each other. The Diamond Award tells us we are on the right track.</p>

            <p>But we are not stopping here. <a href="cary_FINAL.html">MEGA Cary</a> is open and growing fast. Our class schedule keeps expanding. And we are doubling down on what got us here: the burn, the vibe, and the people.</p>

            <h2>Come See What the Hype Is About</h2>
            <p>If you have not tried MEGA yet, now is the time. Grab our <a href="first_timer_FINAL.html">3-class intro pack for $40</a> and see why the Triangle voted us the best. We have Lagree Megaformer classes that will make you shake, <a href="tramp_FINAL.html">Tramp Cardio</a> that feels like a party, and <a href="mat_FINAL.html">Mat Pilates</a> that builds you from the core out.</p>

            <p>Thank you to everyone who voted. This award belongs to you, the MEGA community. Now let us get back to work.</p>
