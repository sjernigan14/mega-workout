            <p>Thinking about booking your first <a href="lagree_FINAL.html">Lagree Megaformer class</a>? You're probably wondering what to expect. Will it be hard? Do you need experience? What do you actually wear? Let's walk through your first class from arrival to afterglow.</p>

            <h2>Before You Arrive</h2>

            <h3>What to Wear</h3>
            <p>Wear fitted, moisture-wicking clothes. Avoid anything baggy or loose—the Megaformer has a gliding carriage, and loose fabric can get caught. Leggings and fitted tops are perfect. Bring a light layer if you run cold, but expect to warm up quickly.</p>

            <h3>Grip Socks</h3>
            <p>This is non-negotiable. You'll need grip socks (sometimes called yoga or pillow socks) with rubber grips on the soles. They prevent slipping on the machine and keep your feet stable during movements. Don't have a pair? No problem—we sell them at the studio, or you can bring your own.</p>

            <h3>Hydration</h3>
            <p>Bring a water bottle. You will sweat. Lagree is intense, and the constant tension means your body is working hard the entire 50 minutes. Hydrate before class and have water ready for sips during.</p>

            <h3>Timing</h3>
            <p>Arrive 10-15 minutes early for your first class. This gives you time to check in, get fitted to the Megaformer, and ask any last-minute questions. You don't want to rush into your first session stressed or unprepared.</p>

            <h2>The Megaformer Machine</h2>

            <p>The Megaformer looks intimidating at first. It's a spring-based machine with a gliding carriage, handles, foot platforms, and rails. Don't let the complexity scare you.</p>

            <p>Here's what your instructor will do during setup:</p>
            <ul>
              <li>Adjust the spring resistance (lighter for beginners, heavier for advanced)</li>
              <li>Show you where to grip the handles</li>
              <li>Position your feet on the platforms</li>
              <li>Walk you through one or two movements so you understand the mechanics</li>
            </ul>

            <div className="pull-quote">Your instructor is trained to make the Megaformer accessible to all fitness levels. Every modification exists for a reason.</div>

            <h2>Class Structure (50 minutes)</h2>

            <h3>Warm-Up (5-7 minutes)</h3>
            <p>You'll start with a series of dynamic stretches and light movements to warm up the joints and activate your core. This isn't intense, but it's setting the stage for what's coming.</p>

            <h3>Main Class (40 minutes)</h3>
            <p>This is where the magic happens. The instructor will lead sequences targeting different muscle groups: legs, glutes, upper body, core, and back. Each sequence is slow—typically 2-3 seconds per movement—with constant tension. You're not resting between reps; the spring resistance keeps your muscles engaged.</p>

            <p>You'll notice your muscles shaking or quivering. This is the "Lagree Shake," and it means the work is happening. It's completely normal and actually a sign that you're recruiting deep muscle fibers.</p>

            <h3>Cool-Down & Stretch (5-10 minutes)</h3>
            <p>The class ends with gentle stretching to release tension and bring your heart rate down. You'll be breathing hard, you'll be shaking, and you'll feel proud.</p>

            <h2>Modifications Are Your Friend</h2>

            <p>Not every exercise will feel good for your body on day one. That's okay. Your instructor will offer:</p>
            <ul>
              <li><strong>Lighter spring resistance</strong> for scaled-down intensity</li>
              <li><strong>Range-of-motion modifications</strong> if a movement doesn't feel right</li>
              <li><strong>Alternative exercises</strong> if you have any joint concerns</li>
            </ul>

            <p>Use modifications liberally in your first class. Lagree is about intensity and muscle engagement, not ego. A lighter resistance with perfect form beats heavy resistance with poor form every time.</p>

            <h2>What You'll Feel</h2>

            <h3>During Class</h3>
            <p>Expect to feel your muscles working intensely. Your legs, glutes, and core will be the primary focus, but your entire body gets engaged. You might shake. You'll definitely sweat. Your heart will be elevated.</p>

            <h3>Immediately After</h3>
            <p>You'll feel energized and exhausted at the same time. Some people feel a natural high from the endorphin release. Your muscles will feel fatigued but in a good way—like you accomplished something real.</p>

            <h3>The Next 24-48 Hours</h3>
            <p>Soreness is likely. Lagree uses muscles in ways your body might not be accustomed to, so DOMS (Delayed Onset Muscle Soreness) is common after your first class. This isn't a sign of injury; it's a sign that your muscles are adapting. The soreness typically fades by day 3 or 4.</p>

            <h2>Quick Tips for Success</h2>

            <ul>
              <li><strong>Eat lightly before class.</strong> A small snack 30-60 minutes prior is fine; a full meal right before isn't comfortable.</li>
              <li><strong>Communicate with your instructor.</strong> Mention if you have any injuries or concerns. They'll modify for you.</li>
              <li><strong>Don't compare yourself to others.</strong> Everyone in the class is at a different level. Focus on your own form and effort.</li>
              <li><strong>Come back.</strong> Your second class will feel easier. By your third or fourth class, you'll notice strength gains. Consistency is key.</li>
            </ul>

            <h2>Ready to Book?</h2>

            <p>Your first class is an investment in your fitness. To make it easy, we offer the <a href="pricing_FINAL.html">3-Class Intro Pack for $40</a>—a way to try Lagree risk-free. Our instructors are welcoming and supportive, and every beginner has walked in your shoes.</p>

            <p>Check out our <a href="first_timer_FINAL.html">First Timer page for more info</a>, and let's get you shaking on the Megaformer.</p>
