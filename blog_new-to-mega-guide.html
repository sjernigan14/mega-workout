      <section className="article-body">

          <div className="article-content">
            <p>Welcome to MEGA. Whether you're here because you heard about Lagree, want to try something new, or just like the energy—we're stoked you're here. This guide walks you through everything. We've got you.</p>

            <h2>Who We Are</h2>

            <p>MEGA is the Triangle's boutique studio focused on three formats: Lagree (Megaformer), Trampoline Cardio, and Mat Pilates. We're in Raleigh and Cary. All our instructors are trained in their formats. Our mission? Make fitness efficient, effective, and actually fun.</p>

            <h2>The Three Formats</h2>

            <h3>Lagree Megaformer</h3>

            <p>50 minutes of high-intensity, low-impact strength on the Megaformer. Slow. Controlled. The burn is real. You will shake, you will sweat, you will feel like you actually did something. No experience needed—modifications exist for everyone. <a href="blog_first-megaformer-class.html">Want to know what to expect in your first class</a>? We have you covered.</p>

            <h3>Trampoline Cardio</h3>

            <p>45-50 minutes on a mini-rebounder. HIIT intensity. Zero impact. The bounce is literally addictive. You'll be drenched, you'll feel alive, and your knees will thank you.</p>

            <h3>Mat Pilates</h3>

            <p>50 minutes of controlled, flowing movements on a mat. Lower intensity than Lagree, but core strength and flexibility for days. Perfect for recovery days. Accessible to everyone.</p>

            <div className="pull-quote">Most members mix all three. Lagree for strength. Tramp for cardio. Mat for recovery. You choose.</div>

            <h2>Where We Are</h2>

            <h3>Raleigh</h3>

            <p>Central location. Free parking. Brand-new Megaformers, professional-grade rebounders, amazing community. <a href="blog_raleigh-five-points-guide.html">Check out our Raleigh Five Points guide for more</a>.</p>

            <h3>Cary</h3>

            <p>Same quality classes and instruction. Cary is fitness hub. <a href="blog_cary-downtown-guide.html">Learn more on our Cary downtown guide</a>.</p>

            <h2>How to Book</h2>

            <p><strong>Step 1: Pick Your Format</strong></p>
            <p>Lagree, Tramp, or Mat? Not sure? Lagree is our signature. Most first-timers start there. Our <a href="first_timer_FINAL.html">New Here page</a> has more guidance.</p>

            <p><strong>Step 2: Check Schedule</strong></p>
            <p>Classes all day—morning, midday, evening. Find what works for you.</p>

            <p><strong>Step 3: Book</strong></p>
            <p>Select the class, pick your time, book. First-timers get the Intro Pack (3 classes for $40). That's the move.</p>

            <p><strong>Step 4: Show Up Early</strong></p>
            <p>10-15 minutes early. Check in. Meet your instructor. Get set up. Our team walks you through everything.</p>

            <h2>What to Bring</h2>

            <ul>
              <li><strong>Fitted workout clothes:</strong> Nothing loose (it catches on machines). Leggings and a fitted top? Perfect.</li>
              <li><strong>Grip socks:</strong> Non-negotiable. Rubber soles keep you stable. We sell them or bring your own.</li>
              <li><strong>Water bottle:</strong> You're going to sweat. Hydrate.</li>
              <li><strong>Towel:</strong> Optional but you'll want one post-class.</li>
              <li><strong>Phone/wallet:</strong> Secure lockers available.</li>
            </ul>

            <h2>First Class Tips</h2>

            <ul>
              <li>Tell your instructor everything. Injuries, concerns, anything. Modifications exist.</li>
              <li>Use lighter springs on your first Lagree. You can always go heavier next time.</li>
              <li>Don't compare. Your neighbor's doing their thing. You're doing yours. Focus on your effort.</li>
              <li>You'll be sore tomorrow. That's normal. Fades by day 3. Come back for class two and it's easier.</li>
              <li>Consistency is everything. Class two feels better. Class four shows real gains.</li>
            </ul>

            <h2>The Community</h2>

            <p>MEGA is more than a studio. It's a community. Supportive, encouraging, invested in each other. You'll recognize faces, make friends, feel like you belong. That's the vibe.</p>

            <h2>Pricing</h2>

            <p>Flexible options for every budget. <a href="pricing_FINAL.html">Check our Pricing page</a> for full details, but here's the quick version:</p>

            <ul>
              <li><strong>Intro Pack:</strong> 3 classes for $40. No contract. Start here.</li>
              <li><strong>Class Packages:</strong> Bulk discounts</li>
              <li><strong>Monthly Memberships:</strong> Unlimited classes</li>
              <li><strong>Drop-In:</strong> Pay as you go</li>
            </ul>

            <h2>What's Next?</h2>

            <p>Ready? <a href="first_timer_FINAL.html">Check our First Timer page</a> for format-specific details. Or just book a class right now. No contracts. No pressure. Just great fitness and an amazing community.</p>
